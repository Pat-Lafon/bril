[envs.brili]
command = "bril2json < {filename} | brili {args}"

[envs.brilirs]
default = false
command = "cargo run --manifest-path ../../brilirs/Cargo.toml -- --file {filename} --text {args}"

[envs.brilift-aot]
default = false
command = "bril2json < {filename} | ../../brilift/run.sh {args}"

[envs.brilift-jit]
default = false
command = "bril2json < {filename} | ../../brilift/target/release/brilift -j -- {args}"

[envs.brillvm]
default = false
command = "bril2json < {filename} | cargo run -q --manifest-path ../../bril-rs/brillvm/Cargo.toml -- -r ../../bril-rs/brillvm/rt.bc -i {args}"

[envs.brilm]
default = false
command = "bril2json < {filename} | cargo run -q --manifest-path ../../bril-rs/brilm/Cargo.toml | ../../brilir/build/bin/bril-opt --convert-bril-to-std | mlir-opt --convert-func-to-llvm --convert-arith-to-llvm --convert-cf-to-llvm --reconcile-unrealized-casts | mlir-translate --mlir-to-llvmir | lli /dev/stdin {args}"